<!DOCTYPE html>
<html lang="ru">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Секретный доступ</title>
	<link rel="shortcut icon" href="img/favicon/Danila.png" type="image/x-icon">
	<link rel="stylesheet" href="css/style.css">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link
		href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
		rel="stylesheet">
</head>

<body>

	<!-- Шапка сайта -->
	<header class="header">
		<nav class="nav">
			<a href="index.html" class="nav__link">Главная</a>
			<a href="gallery.html" class="nav__link">Галерея</a>
			<a href="secret.html" class="nav__link active">Письмо</a>
		</nav>
	</header>

	<!-- Блок ввода пароля -->
	<section class="secret-section">
		<div class="secret-box hidden">
			<div class="secret-icon">🔒</div>
			<h2 class="secret-title">Секретное послание</h2>
			<p class="secret-desc">Если ты сюда зашла, напиши мне, дабы узнать пароль</p>

			<div class="secret-form">
				<input type="password" id="secretInput" placeholder="Введи код..." autocomplete="off">
				<button id="secretBtn">Открыть письмо</button>
			</div>

			<p id="secretError" class="secret-error">Код неверный, попробуй еще раз! 💔</p>
		</div>
	</section>

	<!-- === СКРИПТЫ АНИМАЦИИ И ЛОГИКИ === -->
	<script src="script.js"></script>
</body>

</html>
